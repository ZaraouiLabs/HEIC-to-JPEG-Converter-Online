    <main class="main-content">

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const downloadBtn = document.getElementById('download-btn');
        let convertedBlob = null;

        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));
        dropZone.addEventListener('drop', (e) => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); });
        dropZone.addEventListener('dragover', (e) => e.preventDefault());

        async function handleFile(file) {
            if (!file) return;
            try {
                convertedBlob = await heic2any({ blob: file, toType: "image/jpeg", quality: 0.8 });
                downloadBtn.style.display = 'block';
            } catch (err) {
                alert("Error converting file. Ensure it is a valid HEIC image.");
            }
        }

        downloadBtn.addEventListener('click', () => {
            if (!convertedBlob) return;
            const link = document.createElement('a');
            link.href = URL.createObjectURL(convertedBlob);
            link.download = "converted_image.jpg";
            link.click();
        });

       const tools = [
            { name: "QR Generator", url: "https://zaraouilabs.github.io/QR-Code-Generator/" },
            { name: "Image Compressor", url: "https://zaraouilabs.github.io/Image-Compressor/" },
            { name: "Date Calculator", url: "https://zaraouilabs.github.io/Date-Calculator/" },
            { name: "WebP Converter", url: "https://zaraouilabs.github.io/webp-to-jpg-convertor/" },
            { name: "JSON Formatter", url: "https://zaraouilabs.github.io/JSON-formatter/" },
            { name: "Word Counter", url: "https://zaraouilabs.github.io/wordcount-pro/" },
            { name: "Case Converter", url: "https://zaraouilabs.github.io/case-converter/" },
            { name: "Percentage Calc", url: "https://zaraouilabs.github.io/percentage_counter/" },
            { name: "Base64 Converter", url: "https://zaraouilabs.github.io/Base64_convertor/" },
            { name: "Password Generator", url: "https://zaraouilabs.github.io/Password_Generator/" },
            { name: "Loan Calculator", url: "https://zaraouilabs.github.io/loan-calculator/" },
        ];
        
        const toolsHTML = tools.map(t => `<a href="${t.url}" class="tool-btn">${t.name}</a>`).join('');
        document.getElementById('tools-sidebar').innerHTML = toolsHTML;
        document.getElementById('mobile-tools-list').innerHTML = toolsHTML;
    </script>
